<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RTX Grass & Clouds</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            pointer-events: none;
            text-shadow: 0 1px 2px black;
        }
        h1 { font-size: 1.2rem; margin: 0 0 5px 0; letter-spacing: 1px; }
        p { font-size: 0.8rem; margin: 0; opacity: 0.7; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: 1.5rem; transition: opacity 0.5s;
        }
        /* Mobile nipple controls container - dynamically added */
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://esm.sh/three@0.169.0",
            "three/addons/": "https://esm.sh/three@0.169.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui">
        <h1>RTX OUTDOOR SIM</h1>
        <p>WebGPU / CSM / Volumetric Shadows</p>
        <p>WASD + Mouse to move</p>
    </div>
    <div id="loading">Compiling Shaders...</div>
